services:
  backend:
    build:
      target: development
    environment:
      JUNJO_DEV_FRONTEND_PORT: ${JUNJO_DEV_FRONTEND_PORT:-26151}
      JUNJO_DEV_BACKEND_PORT: ${JUNJO_DEV_BACKEND_PORT:-26152}
      JUNJO_DEV_OTLP_GRPC_PORT: ${JUNJO_DEV_OTLP_GRPC_PORT:-26153}
    volumes:
      - ./backend/app:/app/app
    ports:
      - "127.0.0.1:${JUNJO_DEV_BACKEND_PORT:-26152}:1323"

  ingestion:
    build:
      target: development
    volumes:
      - ./ingestion/src:/app/src:ro
      - ./proto:/proto:ro
      - ./ingestion/Cargo.toml:/app/Cargo.toml:ro
      - ./ingestion/Cargo.lock:/app/Cargo.lock
      - ./ingestion/build.rs:/app/build.rs:ro
      - ingestion-cargo-cache:/usr/local/cargo/registry
      - ingestion-target-cache:/app/target
    ports:
      - "127.0.0.1:${JUNJO_DEV_OTLP_GRPC_PORT:-26153}:4317"

  frontend:
    build:
      target: development
    environment:
      JUNJO_DEV_FRONTEND_PORT: ${JUNJO_DEV_FRONTEND_PORT:-26151}
      VITE_API_HOST: http://localhost:${JUNJO_DEV_BACKEND_PORT:-26152}
    volumes:
      - frontend-modules:/app/node_modules
      - ./frontend:/app
    ports:
      - "127.0.0.1:${JUNJO_DEV_FRONTEND_PORT:-26151}:5173"

volumes:
  frontend-modules:
  ingestion-cargo-cache:
  ingestion-target-cache:
