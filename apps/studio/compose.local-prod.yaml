# Local production-image smoke test only.
# This file validates the production images on localhost.
# It is not the hosted deployment template for Junjo AI Studio.
services:
  backend:
    ports:
      - "127.0.0.1:${JUNJO_LOCAL_PROD_BACKEND_PORT:-8081}:1323"
    environment:
      JUNJO_ENV: production
      JUNJO_PROD_FRONTEND_URL: http://localhost:${JUNJO_LOCAL_PROD_FRONTEND_PORT:-8080}
      JUNJO_PROD_BACKEND_URL: http://localhost:${JUNJO_LOCAL_PROD_BACKEND_PORT:-8081}
      JUNJO_PROD_INGESTION_URL: http://localhost:${JUNJO_LOCAL_PROD_OTLP_GRPC_PORT:-4317}

  ingestion:
    ports:
      - "127.0.0.1:${JUNJO_LOCAL_PROD_OTLP_GRPC_PORT:-4317}:4317"

  frontend:
    ports:
      - "127.0.0.1:${JUNJO_LOCAL_PROD_FRONTEND_PORT:-8080}:80"
    environment:
      JUNJO_ENV: production
      JUNJO_PROD_FRONTEND_URL: http://localhost:${JUNJO_LOCAL_PROD_FRONTEND_PORT:-8080}
      JUNJO_PROD_BACKEND_URL: http://localhost:${JUNJO_LOCAL_PROD_BACKEND_PORT:-8081}
      JUNJO_PROD_INGESTION_URL: http://localhost:${JUNJO_LOCAL_PROD_OTLP_GRPC_PORT:-4317}
