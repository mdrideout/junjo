name: Publish Python SDK to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: python-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  library-health:
    if: startsWith(github.event.release.tag_name, 'sdk-python-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Validate release tag matches Python package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          EXPECTED_TAG="sdk-python-v${VERSION}"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "Release tag must be $EXPECTED_TAG, received $RELEASE_TAG." >&2
            exit 1
          fi

      - name: Sync Junjo library dependencies
        run: uv sync --frozen --package junjo --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -q

      - name: Ty
        run: uv run ty check --error-on-warning src

      - name: Sphinx
        run: uv run sphinx-build -b html docs docs/_build/html

      - name: Validate shared telemetry contract
        run: python ../../contracts/telemetry/compatibility/validate_contract.py

      - name: Build distributions
        run: uv run python -m build

      - name: Validate distributions
        run: uv run twine check dist/*

      - name: Verify release commit is on master
        run: |
          git fetch origin master
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/master; then
            echo "Release commit must be reachable from origin/master." >&2
            exit 1
          fi

      - name: Upload distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-distributions
          path: sdks/python/dist/*

  publish:
    if: startsWith(github.event.release.tag_name, 'sdk-python-v')
    needs: library-health
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/junjo/
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-distributions
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
