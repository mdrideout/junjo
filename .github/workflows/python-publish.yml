name: Publish Python SDK to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: python-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  sdk-validation:
    if: startsWith(github.event.release.tag_name, 'sdk-python-v')
    uses: ./.github/workflows/python-ci.yml

  examples-validation:
    if: startsWith(github.event.release.tag_name, 'sdk-python-v')
    uses: ./.github/workflows/python-examples-smoke.yml

  compose-validation:
    if: startsWith(github.event.release.tag_name, 'sdk-python-v')
    uses: ./.github/workflows/ai-chat-compose-smoke.yml

  documentation-validation:
    if: startsWith(github.event.release.tag_name, 'sdk-python-v')
    uses: ./.github/workflows/website-ci.yml
    with:
      documentation_channel: stable
      release_tag: ${{ github.event.release.tag_name }}

  build-release:
    if: startsWith(github.event.release.tag_name, 'sdk-python-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv==0.11.7

      - name: Validate release tag matches Python package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          EXPECTED_TAG="sdk-python-v${VERSION}"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "Release tag must be $EXPECTED_TAG, received $RELEASE_TAG." >&2
            exit 1
          fi

      - name: Sync Junjo library dependencies
        run: uv sync --frozen --package junjo --extra dev

      - name: Build distributions
        run: uv run python -m build

      - name: Validate distributions
        run: uv run twine check dist/*

      - name: Verify release commit is on master
        run: |
          git fetch origin master
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/master; then
            echo "Release commit must be reachable from origin/master." >&2
            exit 1
          fi

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: sdks/python/dist/*

  publish:
    if: startsWith(github.event.release.tag_name, 'sdk-python-v')
    needs:
      - sdk-validation
      - examples-validation
      - compose-validation
      - documentation-validation
      - build-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/junjo/
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/

  promote-documentation:
    if: startsWith(github.event.release.tag_name, 'sdk-python-v')
    needs: publish
    permissions:
      contents: write
    uses: ./.github/workflows/documentation-production-promotion.yml
    with:
      release_tag: ${{ github.event.release.tag_name }}
