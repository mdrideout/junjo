name: Python Examples

on:
  pull_request:
    paths:
      - "sdks/python/examples/**"
      - "sdks/python/src/junjo/**"
      - "sdks/python/pyproject.toml"
      - "sdks/python/uv.lock"
      - ".github/workflows/python-examples-smoke.yml"
  push:
    branches: [master]
    paths:
      - "sdks/python/examples/**"
      - "sdks/python/src/junjo/**"
      - "sdks/python/pyproject.toml"
      - "sdks/python/uv.lock"
      - ".github/workflows/python-examples-smoke.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: python-examples-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ai-chat-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Validate AI chat Compose model
        run: docker compose --file examples/ai_chat/compose.yaml config --quiet
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "sdks/python/uv.lock"
      - name: Sync AI chat backend
        run: uv sync --frozen --package junjo-ai-chat-example
      - name: Lint AI chat backend
        run: uv run --package junjo-ai-chat-example ruff check examples/ai_chat/backend
      - name: Type-check AI chat backend
        run: uv run --package junjo-ai-chat-example ty check --error-on-warning examples/ai_chat/backend/src
      - name: Run all deterministic AI chat scenarios
        run: uv run --package junjo-ai-chat-example pytest -q examples/ai_chat/backend/tests

  ai-chat-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python/examples/ai_chat/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdks/python/examples/ai_chat/frontend/package-lock.json
      - name: Install exact dependencies
        run: npm ci
      - name: Run frontend tests
        run: npm test -- --run
      - name: Lint frontend
        run: npm run lint
      - name: Build frontend
        run: npm run build

  getting-started:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
      - name: Sync getting-started example
        run: uv sync --frozen --package getting-started
      - name: Run getting-started example
        run: uv run --package getting-started python examples/getting_started/main.py

  base:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
      - name: Sync base example
        run: uv sync --frozen --package base --all-extras
      - name: Build base example graph
        run: |
          uv run --package base python -c \
            "from base.sample_workflow.graph import create_sample_workflow_graph; print(create_sample_workflow_graph().to_dot_notation())"
