name: Studio Proto Staleness PR

on:
  pull_request:
    paths:
      - "apps/studio/proto/**"
      - "apps/studio/backend/app/proto_gen/**"
      - "apps/studio/backend/scripts/generate_proto.sh"
      - "apps/studio/backend/pyproject.toml"
      - "apps/studio/backend/uv.lock"
      - "apps/studio/ingestion/build.rs"
      - "apps/studio/ingestion/Cargo.toml"
      - "apps/studio/ingestion/Cargo.lock"
      - "apps/studio/PROTO_VERSIONS.md"
      - "apps/studio/run-all-proto-gen.sh"
      - ".github/workflows/studio-proto-staleness*.yml"

permissions:
  contents: read

jobs:
  validation:
    uses: ./.github/workflows/studio-proto-staleness-check.yml
