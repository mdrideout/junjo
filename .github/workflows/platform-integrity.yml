name: Platform Integrity

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  repository-invariants:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Validate monorepo boundaries and release routing
        run: python3 tooling/scripts/validate_repository.py
      - name: Validate GitHub Actions syntax
        run: |
          docker run --rm \
            --volume "$PWD:/repo" \
            --workdir /repo \
            rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 \
            -color
      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
      - name: Audit GitHub Actions security
        run: uvx zizmor==1.26.1 --format plain .github/workflows
