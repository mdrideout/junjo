name: Platform Integrity

on:
  push:
    branches: [master]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  repository-invariants:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate monorepo boundaries and release routing
        run: python3 tooling/scripts/validate_repository.py
      - name: Run platform tooling unit tests
        run: python3 -m unittest discover -s tooling/tests -p 'test_*.py' -v
      - name: Validate GitHub Actions syntax
        run: |
          docker run --rm \
            --volume "$PWD:/repo" \
            --workdir /repo \
            rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 \
            -color
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - name: Audit GitHub Actions security
        run: uvx zizmor==1.26.1 --format plain .github/workflows
