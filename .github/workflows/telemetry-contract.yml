name: Telemetry Contract

on:
  push:
    branches: [master]
    paths:
      - "contracts/telemetry/**"
      - "sdks/python/src/junjo/telemetry/**"
      - "sdks/python/src/junjo/graph.py"
      - "sdks/python/src/junjo/workflow.py"
      - "apps/studio/ingestion/**"
      - "apps/studio/backend/app/features/otel_spans/**"
      - "apps/studio/frontend/src/features/traces/**"
      - ".github/workflows/telemetry-contract.yml"
  pull_request:
    paths:
      - "contracts/telemetry/**"
      - "sdks/python/src/junjo/telemetry/**"
      - "sdks/python/src/junjo/graph.py"
      - "sdks/python/src/junjo/workflow.py"
      - "apps/studio/ingestion/**"
      - "apps/studio/backend/app/features/otel_spans/**"
      - "apps/studio/frontend/src/features/traces/**"
      - ".github/workflows/telemetry-contract.yml"
  workflow_dispatch:

jobs:
  canonical-fixtures:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Validate schemas and fixtures
        run: python3 contracts/telemetry/compatibility/validate_contract.py

  python-producer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "sdks/python/uv.lock"
      - name: Sync
        run: uv sync --frozen --package junjo --extra dev
      - name: Run Python conformance checks
        run: uv run pytest -q tests/test_telemetry_contract.py tests/test_hooks.py tests/test_store_state_serialization.py

  studio-consumers:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/studio/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/studio/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run normalized telemetry consumer tests
        run: |
          npm run test:run -- \
            src/features/traces/schemas/junjo-transport-contract.test.ts \
            src/features/traces/store/selectors.test.ts \
            src/junjo-graph/junjo-graph.test.ts \
            src/mermaidjs/junjo-graph-span-matching.test.ts
