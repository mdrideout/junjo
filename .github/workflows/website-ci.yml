name: Public Documentation Validation

on:
  push:
    branches: [master]
    paths:
      - "apps/website/**"
      - "apps/studio/docs/**"
      - "apps/studio/deployments/**"
      - "sdks/python/**"
      - "contracts/telemetry/README.md"
      - "docs/adr/**"
      - "docs/roadmaps/**"
      - "tooling/docs/**"
      - ".github/workflows/website-ci.yml"
      - ".github/workflows/documentation-*.yml"
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      documentation_channel:
        description: Documentation release channel
        required: true
        default: next
        type: choice
        options: [next, stable]
  workflow_call:
    inputs:
      documentation_channel:
        description: Build from a release checkout only when selecting stable
        required: false
        default: next
        type: string
      release_tag:
        description: Published or candidate release tag selecting the production source
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  changes:
    name: Public documentation scope
    runs-on: ubuntu-latest
    outputs:
      docs_changed: ${{ steps.scope.outputs.docs_changed }}
    steps:
      - name: Checkout source history
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Detect public documentation changes
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          docs_changed=true
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            docs_changed=false
            while IFS= read -r path; do
              case "$path" in
                apps/website/* | apps/studio/docs/* | apps/studio/deployments/* | \
                sdks/python/* | contracts/telemetry/README.md | docs/adr/* | \
                docs/roadmaps/* | tooling/docs/* | .github/workflows/website-ci.yml | \
                .github/workflows/documentation-*.yml)
                  docs_changed=true
                  break
                  ;;
              esac
            done < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          fi
          echo "docs_changed=$docs_changed" >> "$GITHUB_OUTPUT"

  website:
    name: Unified documentation source
    needs: changes
    if: needs.changes.outputs.docs_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      JUNJO_DOCS_CHANNEL: ${{ inputs.documentation_channel || 'next' }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
      - name: Sync locked Python SDK documentation dependencies
        run: uv sync --frozen --package junjo --extra dev
        working-directory: sdks/python
      - name: Validate Python API public surface
        run: uv run python docs/export_api.py validate
        working-directory: sdks/python
      - name: Sync locked legacy-release conversion tooling
        run: uv sync --frozen
        working-directory: tooling/docs
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.12"
          cache: npm
          cache-dependency-path: apps/website/package-lock.json
      - name: Install locked dependencies
        run: npm ci
        working-directory: apps/website
      - name: Validate release-selected stable sources
        if: env.JUNJO_DOCS_CHANNEL == 'stable' && inputs.release_tag != ''
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: >-
          python3 tooling/docs/validate_release_manifest.py
          --release-tag "$RELEASE_TAG"
      - name: Assemble source-owned documentation
        run: npm run docs:assemble
        working-directory: apps/website
      - name: Check content and TypeScript
        run: npm run check
        working-directory: apps/website
      - name: Build production site
        run: npm run build
        working-directory: apps/website
      - name: Validate migration parity, routes, anchors, search, and links
        run: npm run validate:build
        working-directory: apps/website
      - name: Prove documentation assembly is deterministic
        run: npm run docs:check
        working-directory: apps/website
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
        working-directory: apps/website

  validation:
    name: Public documentation
    if: always()
    needs: [changes, website]
    runs-on: ubuntu-latest
    steps:
      - name: Enforce scoped validation result
        env:
          DOCS_CHANGED: ${{ needs.changes.outputs.docs_changed }}
          WEBSITE_RESULT: ${{ needs.website.result }}
        run: |
          if [[ "$DOCS_CHANGED" == "true" && "$WEBSITE_RESULT" != "success" ]]; then
            echo "Public documentation changed but full validation did not pass."
            exit 1
          fi
