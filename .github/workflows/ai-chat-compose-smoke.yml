name: AI Chat Compose Startup

on:
  push:
    branches: [master]
    paths:
      - "sdks/python/examples/ai_chat/**"
      - "sdks/python/src/junjo/**"
      - "sdks/python/pyproject.toml"
      - "sdks/python/uv.lock"
      - ".github/workflows/ai-chat-compose-smoke.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ai-chat-compose-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clean-startup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: sdks/python/examples/ai_chat
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Prove clean Compose startup for both provider compositions
        run: ./scripts/validate-compose-startup.sh
