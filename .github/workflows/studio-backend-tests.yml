name: Studio Backend and Ingestion

on:
  push:
    branches: [master]
    paths:
      - "apps/studio/LICENSE"
      - "apps/studio/THIRD_PARTY_NOTICES.md"
      - "apps/studio/licenses/**"
      - "apps/studio/backend/**"
      - "apps/studio/ingestion/**"
      - "apps/studio/proto/**"
      - "contracts/telemetry/**"
      - "tooling/scripts/validate_studio_artifact_licenses.py"
      - ".github/workflows/studio-backend-tests.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "apps/studio/backend/uv.lock"
      - name: Install backend dependencies
        working-directory: apps/studio/backend
        run: uv sync --all-extras --locked
      - name: Install protoc 30.2
        run: |
          PROTOC_VERSION=30.2
          PROTOC_SHA256="327e9397c6fb3ea2a542513a3221334c6f76f7aa524a7d2561142b67b312a01f"
          PROTOC_ARCHIVE="protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          curl -fsSLO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PROTOC_ARCHIVE}"
          printf '%s  %s\n' "${PROTOC_SHA256}" "${PROTOC_ARCHIVE}" | sha256sum --check -
          sudo unzip -q -o "${PROTOC_ARCHIVE}" -d /usr/local bin/protoc 'include/*'
          rm "${PROTOC_ARCHIVE}"
          test "$(protoc --version)" = "libprotoc ${PROTOC_VERSION}"
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          toolchain: stable
      - name: Run backend tests
        working-directory: apps/studio
        run: ./backend/scripts/run-backend-tests.sh 2>&1 | tee /tmp/backend-test.log
        env:
          PYTHONUNBUFFERED: "1"
          JUNJO_SESSION_SECRET: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          JUNJO_SECURE_COOKIE_KEY: "AQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQE="
          JUNJO_INTERNAL_GRPC_TOKEN: "test-internal-grpc-token-32-bytes-long"
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: studio-backend-test-logs
          path: /tmp/backend-test.log
          retention-days: 7

  backend-lint:
    name: Backend Lint and Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: apps/studio/backend
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "apps/studio/backend/uv.lock"
      - name: Install backend dependencies
        run: uv sync --all-extras --locked
      - name: Ruff check
        run: uv run ruff check app/ --output-format=github
      - name: Ruff format check
        run: uv run ruff format app/ --check

  ingestion-tests:
    name: Ingestion Rust Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/studio/ingestion
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install protoc 30.2
        run: |
          PROTOC_VERSION=30.2
          PROTOC_SHA256="327e9397c6fb3ea2a542513a3221334c6f76f7aa524a7d2561142b67b312a01f"
          PROTOC_ARCHIVE="protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          curl -fsSLO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PROTOC_ARCHIVE}"
          printf '%s  %s\n' "${PROTOC_SHA256}" "${PROTOC_ARCHIVE}" | sha256sum --check -
          sudo unzip -q -o "${PROTOC_ARCHIVE}" -d /usr/local bin/protoc 'include/*'
          rm "${PROTOC_ARCHIVE}"
          test "$(protoc --version)" = "libprotoc ${PROTOC_VERSION}"
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          toolchain: stable
      - name: Run ingestion tests
        run: cargo test --locked --message-format=short
      - name: Validate production dependency license closure
        run: |
          python3 ../../../tooling/scripts/validate_studio_artifact_licenses.py \
            check \
            --with-cargo-metadata
