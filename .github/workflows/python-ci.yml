name: Python SDK

on:
  pull_request:
    branches: [master]
    paths:
      - "sdks/python/**"
      - "contracts/telemetry/**"
      - ".github/workflows/python-ci.yml"
  push:
    branches: [master]
    paths:
      - "sdks/python/**"
      - "contracts/telemetry/**"
      - ".github/workflows/python-ci.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  library-health:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync Junjo library dependencies
        run: uv sync --frozen --package junjo --extra dev

      - name: Check lockfile
        run: uv lock --check

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -q

      - name: Ty
        run: uv run ty check --error-on-warning src

      - name: Sphinx
        run: uv run sphinx-build -b html docs docs/_build/html

      - name: Validate shared telemetry contract
        run: python ../../contracts/telemetry/compatibility/validate_contract.py

      - name: Build distributions
        run: uv run python -m build

      - name: Validate distributions
        run: uv run twine check dist/*
